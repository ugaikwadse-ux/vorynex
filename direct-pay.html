<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initiating Secure Payment | Vorynex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --accent: #06b6d4;
            --bg: #0b0f1a;
            --text: #f4f4f5;
            --text-dim: #a1a1aa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(6, 182, 212, 0.1) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .loader-container {
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .spinner {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 32px;
        }

        .spinner-ring {
            position: absolute;
            inset: 0;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }

        .spinner-glow {
            position: absolute;
            inset: -10px;
            background: var(--primary);
            filter: blur(25px);
            opacity: 0.15;
            border-radius: 50%;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.15; }
            50% { transform: scale(1.2); opacity: 0.25; }
        }

        .status-text {
            font-size: 0.875rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--primary-light);
            margin-bottom: 12px;
        }

        .plan-info {
            font-size: 1.125rem;
            color: var(--text-dim);
            font-weight: 400;
        }

        .error-card {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 24px;
            border-radius: 20px;
            max-width: 320px;
            display: none;
        }

        .error-title {
            color: #f87171;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .btn-retry {
            margin-top: 16px;
            padding: 10px 20px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="loader-container" id="loader">
        <div class="spinner">
            <div class="spinner-glow"></div>
            <div class="spinner-ring"></div>
        </div>
        <p class="status-text">Securing Transaction</p>
        <p class="plan-info" id="plan-display">Preparing your order...</p>
    </div>

    <div class="error-card" id="error-card">
        <p class="error-title">Link Invalid or Expired</p>
        <p id="error-msg" style="font-size: 0.875rem; color: var(--text-dim);">Required parameters are missing from the URL.</p>
        <button class="btn-retry" onclick="window.location.href='index.html'">Return Home</button>
    </div>

    <script>
        const API_BASE = 'https://pay.vorynex.in/api/v1.0/phonePe/payment';

        async function initDirectPayment() {
            const params = new URLSearchParams(window.location.search);
            const plan = params.get('plan');
            const price = params.get('price'); // price in rupees
            const email = params.get('email');
            const phone = params.get('phone');
            const merchantorderid = params.get('merchantorderid');

            // Strict validation
            if (!plan || !price || !email || !phone || !merchantorderid) {
                showAccessDenied("You do not have permission to access this resource.");
                return;
            }

            document.getElementById('plan-display').textContent = `${plan.charAt(0).toUpperCase() + plan.slice(1)} Plan • ₹${price}`;

            try {
                // Convert price to paise for API
                const amountPaisa = Math.round(parseFloat(price) * 100);

                const response = await fetch(`${API_BASE}/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        amount: amountPaisa,
                        email: email || "",
                        phoneno: phone || "",
                        merchantorderid: merchantorderid,
                        plan: plan
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    console.error('Backend Error:', errorData);
                    throw new Error(`Server returned ${response.status}: ${errorData.message || 'Payment initiation failed'}`);
                }

                const data = await response.json();
                
                // Store metadata locally for verification tracking if needed
                const mid = data.merchantorderid || data.merchantOrderId || merchantorderid;
                if (mid) {
                    localStorage.setItem('vorynex_last_mid', mid);
                    localStorage.setItem('vorynex_last_plan', plan);
                    if (email) localStorage.setItem('vorynex_last_email', email);
                    if (phone) localStorage.setItem('vorynex_last_phone', phone);

                    // Communicate with Android Bridge if available (for app tracking)
                    if (window.Android && typeof window.Android.onPaymentInitiated === 'function') {
                        window.Android.onPaymentInitiated(mid);
                    }
                }

                if (data.redirectUrl) {
                    window.location.href = data.redirectUrl;
                } else {
                    throw new Error('No redirect URL received from server');
                }

            } catch (err) {
                console.error('Direct pay error:', err);
                showAccessDenied(`Connection Failed: ${err.message}`);
            }
        }

        function showAccessDenied(msg) {
            document.getElementById('loader').style.display = 'none';
            const card = document.getElementById('error-card');
            card.style.display = 'block';
            card.style.background = 'rgba(239, 68, 68, 0.15)';
            card.style.borderColor = 'rgba(239, 68, 68, 0.4)';
            document.querySelector('.error-title').textContent = 'Access Denied';
            document.getElementById('error-msg').textContent = msg;
        }

        // Run on load
        window.addEventListener('DOMContentLoaded', initDirectPayment);
    </script>
</body>
</html>
